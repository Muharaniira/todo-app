<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/> 
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="app">
        <header>
            <h1>TalkFlow</h1>
            <P class="subtitle">Kelola tugas hari ini</P>
        </header>

        <div class="input-area">
            <input type="text" id="task-input" placeholder="Tambah tugas baru..." autocomplete="off" />
            <select id="priority-select">
                <option value="low">🟢 Rendah</option>
                <option value="medium" selected>🟡 Sedang</option>
                <option value="high">🔴 Tinggi</option>
            </select>
            <button id="add-btn">Tambah</button>
        </div>
        
    </div>
</body>
</html>
